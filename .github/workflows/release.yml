name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Bare SemVer without a v prefix, for example 0.1.0
        required: true

permissions:
  contents: write

jobs:
  release:
    environment: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate immutable version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          if (( ${VERSION%%.*} >= 1 )); then
            echo "stable major releases require credentialed Azure integration and upgrade evidence" >&2
            exit 1
          fi
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "release $VERSION already exists" >&2
            exit 1
          fi
      - name: Create Registry-compatible release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release create "$VERSION" --target "$GITHUB_SHA" --generate-notes --title "$VERSION"
